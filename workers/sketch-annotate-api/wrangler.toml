# Cloudflare Workers — 部署后使用 *.workers.dev 域名，无需备案
# 文档见本目录 README.md

name = "sketch-annotate-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
# 逗号分隔，含本地 Jekyll 预览地址
ALLOWED_ORIGINS = "https://lvdobby.github.io,http://127.0.0.1:4000,http://localhost:4000"
# Replicate 模型：owner/name，支持图 + prompt 编辑
REPLICATE_MODEL = "black-forest-labs/flux-kontext-dev"

# 密钥（勿写入仓库）：
#   wrangler secret put REPLICATE_API_TOKEN
#   wrangler secret put ANNOTATE_TOKEN   # 可选，前端 Bearer 鉴权
