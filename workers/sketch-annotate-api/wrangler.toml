# Cloudflare Workers — 部署后使用 *.workers.dev 域名，无需备案
# 文档见本目录 README.md

name = "sketch-annotate-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGINS = "https://lvdobby.github.io,http://127.0.0.1:4000,http://localhost:4000"
# 图像后端：openrouter（默认）| replicate
IMAGE_PROVIDER = "openrouter"
# OpenRouter：豆包 Seedream 图生图 / 图像编辑（客户端默认 /api/annotate）
OPENROUTER_MODEL = "bytedance-seed/seedream-4.5"
# 可选备用模型（留空则仅使用 OPENROUTER_MODEL）
# OPENROUTER_FALLBACK_MODEL = ""
# OpenRouter：视觉分析（可选 /api/analyze，识图 + 文案）
OPENROUTER_ANALYZE_MODEL = "google/gemini-2.5-flash"
# Recraft 专用：越低越贴近原图（仅当 OPENROUTER_MODEL 为 recraft/* 时生效）
OPENROUTER_IMAGE_STRENGTH = "0.12"
# 可选 Replicate 回退
REPLICATE_MODEL = "black-forest-labs/flux-kontext-dev"

# 密钥（勿写入仓库）：
#   wrangler secret put OPENROUTER_API_KEY
#   wrangler secret put ANNOTATE_TOKEN
# 若使用 replicate：wrangler secret put REPLICATE_API_TOKEN
#
# 异步任务 KV（Replicate 轮询等；OpenRouter 改图在 POST 内同步等待，勿用 waitUntil）
#   wrangler kv namespace create SKETCH_JOBS
#   将返回的 id 填入下方 [[kv_namespaces]]
[[kv_namespaces]]
binding = "SKETCH_JOBS"
id = "98ad1de799934b4e9f16a5a33b7f3283"
